version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: gov-scheme-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheme_monitoring
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scheme_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    build: ./backend
    container_name: gov-scheme-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=scheme_monitoring
      - SECRET_KEY=super_secret_key_change_me_in_production_1234567890
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # React Frontend Service
  frontend:
    build: ./frontend
    container_name: gov-scheme-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      # prevent node_modules shadowing container dependencies
      - /app/node_modules

volumes:
  pgdata:
